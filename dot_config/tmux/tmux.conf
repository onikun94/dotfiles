# ====================================
# tmux設定ファイル (~/.config/tmux/tmux.conf)
# Claude Code Company対応版
# ====================================

# ===============================
# 基本設定
# ===============================

# マウス操作を有効化
set -g mouse on

# 256色ターミナル対応
set -g default-terminal "screen-256color"

# Pass window titles to terminal (Moshi displays these)
set -g set-titles on
# Now it shows 1: Fixing auth... (your window title in tmux)
set -g set-titles-string "#I: #T"

# ウィンドウとpaneの番号を1から開始
set -g base-index 1
set -g pane-base-index 1

# ウィンドウ番号を自動で詰める
set -g renumber-windows on

# ESCの遅延を解消
set -sg escape-time 0

# ヒストリーサイズを増やす
set -g history-limit 50000

# ===============================
# キーバインド（Wezterm互換）
# ===============================

# 設定ファイル再読み込み
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ===== Weztermと同じpane操作 =====
# pane分割（LEADERキー + - で縦分割、LEADERキー + | で横分割）
bind - split-window -v -c "#{pane_current_path}"  # 縦分割（Wezterm SplitVertical）
bind | split-window -h -c "#{pane_current_path}"  # 横分割（Wezterm SplitHorizontal）

# pane移動（LEADERキー + hjkl）
bind h select-pane -L  # 左へ移動
bind j select-pane -D  # 下へ移動
bind k select-pane -U  # 上へ移動
bind l select-pane -R  # 右へ移動

# paneサイズ調整（LEADERキー + Shift + HJKL）
bind -r H resize-pane -L 5  # 左に縮小
bind -r J resize-pane -D 5  # 下に拡大
bind -r K resize-pane -U 5  # 上に拡大
bind -r L resize-pane -R 5  # 右に拡大

# ===== Weztermスクロール互換 =====
# スクロール（LEADERキー + PageUp/PageDown）
bind PageUp copy-mode -u    # PageUpでコピーモード + 上スクロール
bind PageDown send-keys PageDown  # PageDown

# コピーモードでvim風操作
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ===== その他のWezterm互換操作 =====
# コマンドパレット風の機能（Ctrl+P）
bind P choose-tree -Zs  # セッション/ウィンドウ選択（Wezterm Command Palette風）

# ===============================
# ステータスバー設定
# ===============================

# ステータスバーを有効化
set -g status on

# ステータスバーの更新間隔
set -g status-interval 1

# ステータスバーの色
set -g status-bg colour235
set -g status-fg colour255

# ステータスバー左側
set -g status-left-length 50
set -g status-left "#[fg=colour51]Session: #S #[fg=colour255]| "

# ステータスバー右側
set -g status-right-length 50
set -g status-right "#[fg=colour255]%Y-%m-%d %H:%M:%S"

# ウィンドウリストの色
set -g window-status-format "#[fg=colour240] #I:#W "

# ===============================
# その他の便利設定
# ===============================

# 新しいウィンドウで現在のディレクトリを維持
bind c new-window -c "#{pane_current_path}"

# ウィンドウ移動
bind -n S-Left previous-window
bind -n S-Right next-window

# セッション管理
bind T choose-tree

# pane同期切り替えの視覚的表示
set -g window-status-current-format "#{?pane_synchronized,#[bg=red],}#I:#W"
